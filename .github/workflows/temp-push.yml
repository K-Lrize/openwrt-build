name: "Temp: Manual SDK/IB Push"

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target (e.g., mediatek/filogic)'
        default: 'mediatek/filogic'
        required: true
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'K-Lrize/openwrt'
        required: true
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
        required: true
      run_id:
        description: 'Run ID to download artifacts from (optional)'
        required: false

jobs:
  Push:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.openwrt_repo }}
          ref: ${{ inputs.openwrt_ref }}
          fetch-depth: 1

      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: build-config

      - name: Compute names
        id: slugs
        shell: bash
        run: |
          source "build-config/scripts/lib/slugify.sh"
          source "build-config/scripts/lib/image-tags.sh"
          target_slug=$(slugify "${{ inputs.target }}")
          src_slug=$(source_slug "${{ inputs.openwrt_repo }}" "${{ inputs.openwrt_ref }}")
          owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          repo_name_lc=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          prefix=$(image_prefix "$owner_lc" "$repo_name_lc")
          sdk_image=$(sdk_image_tag "$prefix" "${{ inputs.target }}" "${{ inputs.openwrt_repo }}" "${{ inputs.openwrt_ref }}")
          ib_image=$(ib_image_tag  "$prefix" "${{ inputs.target }}" "${{ inputs.openwrt_repo }}" "${{ inputs.openwrt_ref }}")
          {
            echo "target_slug=${target_slug}"
            echo "source_slug=${src_slug}"
            echo "sdk_image=${sdk_image}"
            echo "ib_image=${ib_image}"
            echo "artifact_name=infrastructure-${target_slug}-${src_slug}"
          } >> "$GITHUB_OUTPUT"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.slugs.outputs.artifact_name }}
          path: bin/targets
          run-id: ${{ inputs.run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image context
        shell: bash
        run: |
          bash build-config/scripts/ci/prepare-docker-context.sh \
            "build-config" \
            "bin/targets"

      - name: Push images
        shell: bash
        run: |
          docker build -t ${{ steps.slugs.outputs.ib_image }} docker-ib/
          docker build -t ${{ steps.slugs.outputs.sdk_image }} docker-sdk/
          docker push ${{ steps.slugs.outputs.ib_image }}
          docker push ${{ steps.slugs.outputs.sdk_image }}

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          files: |
            bin/targets/**/openwrt-sdk-*.tar.*
            bin/targets/**/openwrt-imagebuilder-*.tar.*
          prerelease: true
          make_latest: true
