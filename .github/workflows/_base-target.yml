name: "[Reusable] Target Base Builder"

# Reusable: build SDK and ImageBuilder per target,产出三件套推到 rolling release:
#   1. SDK tarball     (内嵌 base-packages/,供 pool/firmware-packages 阶段 sdk/prepare 自动注入 src-link)
#   2. IB tarball      (供 firmware-image 阶段本地 tar -x 后直接 make image)
#   3. IB manifest     (供 firmware analyze-diff 做 Tier1 已装包减法)
# 文件名规则集中在 scripts/lib/asset-names.sh。
#
# 历史:本 workflow 曾把 SDK/IB 打成 docker 镜像推 GHCR,但所有消费端都在
# ubuntu-24.04 runner 上,docker 只是不必要的传输容器 — 直接走 tarball 更简单。

on:
  workflow_call:
    inputs:
      openwrt_repo:
        type: string
        required: true
      openwrt_ref:
        type: string
        required: true
      target:
        type: string
        required: true
    outputs:
      source_slug:
        value: ${{ jobs.Build-Base-Infrastructure.outputs.source_slug }}
      target_slug:
        value: ${{ jobs.Build-Base-Infrastructure.outputs.target_slug }}
      sdk_tar_name:
        value: ${{ jobs.Build-Base-Infrastructure.outputs.sdk_tar_name }}
      ib_tar_name:
        value: ${{ jobs.Build-Base-Infrastructure.outputs.ib_tar_name }}
      ib_manifest_name:
        value: ${{ jobs.Build-Base-Infrastructure.outputs.ib_manifest_name }}

permissions:
  contents: write

jobs:
  Build-Base-Infrastructure:
    name: Build base
    runs-on: ubuntu-24.04
    outputs:
      source_slug:       ${{ steps.slugs.outputs.source_slug }}
      target_slug:       ${{ steps.slugs.outputs.target_slug }}
      sdk_tar_name:      ${{ steps.slugs.outputs.sdk_tar_name }}
      ib_tar_name:       ${{ steps.slugs.outputs.ib_tar_name }}
      ib_manifest_name:  ${{ steps.slugs.outputs.ib_manifest_name }}

    steps:
      - name: Free disk
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget qemu-utils ccache jq zstd device-tree-compiler python3-pyelftools

      - name: Checkout OpenWrt
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.openwrt_repo }}
          ref: ${{ inputs.openwrt_ref }}
          fetch-depth: 1

      - name: Checkout config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Compute names
        id: slugs
        shell: bash
        env:
          TARGET: ${{ inputs.target }}
          REPO:   ${{ inputs.openwrt_repo }}
          REF:    ${{ inputs.openwrt_ref }}
        run: |
          source build-config/scripts/lib/slugify.sh
          source build-config/scripts/lib/asset-names.sh
          {
            echo "target_slug=$(slugify "$TARGET")"
            echo "source_slug=$(source_slug "$REPO" "$REF")"
            echo "sdk_tar_name=$(sdk_tar_name "$TARGET" "$REPO" "$REF")"
            echo "ib_tar_name=$(ib_tar_name "$TARGET" "$REPO" "$REF")"
            echo "ib_manifest_name=$(ib_manifest_name "$TARGET" "$REPO" "$REF")"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare feeds
        shell: bash
        run: bash build-config/scripts/sdk/prepare.sh --workdir .

      - name: Configure base
        shell: bash
        run: |
          target_main=$(echo "${{ inputs.target }}" | cut -d'/' -f1)
          target_sub=$(echo "${{ inputs.target }}" | cut -d'/' -f2)

          cat > .config <<EOF
          CONFIG_TARGET_${target_main}=y
          CONFIG_TARGET_${target_main}_${target_sub}=y
          CONFIG_DEVEL=y
          CONFIG_SDK=y
          CONFIG_IB=y
          CONFIG_IB_STANDALONE=y
          EOF

          if [ -f build-config/common/base-config ]; then
            echo "Adding common/base-config..."
            cat build-config/common/base-config >> .config
          fi

          make defconfig

      - name: Download sources
        run: |
          if ! make download -j8; then
            echo "::warning::Download failed; retrying single-threaded."
            make download -j1 V=s
          fi

      - name: Build tools
        run: |
          if ! make tools/install -j$(nproc) -k; then
            echo "::warning::Tools build failed; retrying single-threaded."
            make tools/install -j1 V=s
          fi

      - name: Build toolchain
        run: |
          if ! make toolchain/install -j$(nproc) -k; then
            echo "::warning::Toolchain build failed; retrying single-threaded."
            make toolchain/install -j1 V=s
          fi

      - name: Build kernel
        run: |
          if ! make target/linux/compile -j$(nproc) -k; then
            echo "::warning::Kernel build failed; retrying single-threaded."
            make target/linux/compile -j1 V=s
          fi

      - name: Build packages
        run: |
          if ! make package/compile -j$(nproc) -k; then
            echo "::warning::Package compile failed; retrying single-threaded."
            make package/compile -j1 V=s
          fi

      - name: Install packages
        run: |
          if ! make package/install -j1; then
            echo "::warning::Package install failed; retrying verbose."
            make package/install -j1 V=s
          fi

      - name: Install kernel
        run: |
          if ! make target/linux/install -j$(nproc) -k; then
             make target/linux/install -j1 V=s
          fi

      - name: Build SDK
        run: |
          if ! make target/sdk/install -j$(nproc) -k; then
            echo "::warning::SDK build failed; retrying single-threaded."
            make target/sdk/install -j1 V=s
          fi

      - name: Build ImageBuilder
        run: |
          if ! make target/imagebuilder/install -j$(nproc) -k; then
            echo "::warning::ImageBuilder build failed; retrying verbose."
            make target/imagebuilder/install -j1 V=s
          fi

      - name: Stage SDK tar (inject base-packages)
        shell: bash
        env:
          SDK_TAR_NAME: ${{ steps.slugs.outputs.sdk_tar_name }}
        run: |
          set -e
          SRC_TAR="$(find bin/targets -name 'openwrt-sdk-*.tar.*' | head -1)"
          [ -n "$SRC_TAR" ] || { echo "::error::SDK tar not found"; exit 1; }

          mkdir -p /tmp/sdk-inject release-staging
          if [[ "$SRC_TAR" == *.zst ]]; then
            tar --use-compress-program=unzstd -xf "$SRC_TAR" -C /tmp/sdk-inject
          else
            tar -xf "$SRC_TAR" -C /tmp/sdk-inject
          fi

          SDK_DIR="$(ls /tmp/sdk-inject | head -1)"
          # 注入 base 源 — prepare-feeds.sh/sdk/prepare.sh 检测到 ./base-packages 自动注入 src-link
          mkdir -p "/tmp/sdk-inject/${SDK_DIR}/base-packages"
          cp -ra package/* "/tmp/sdk-inject/${SDK_DIR}/base-packages/"
          # 软链可能指向主源外部,清理掉确保 SDK 自给自足
          find "/tmp/sdk-inject/${SDK_DIR}/base-packages" -type l -delete

          tar --use-compress-program='zstd -T0 -3' \
              -cf "release-staging/${SDK_TAR_NAME}" \
              -C /tmp/sdk-inject "${SDK_DIR}"

          echo "SDK tar:   $(du -h release-staging/${SDK_TAR_NAME} | awk '{print $1}')"

      - name: Stage IB tar + sidecar manifest
        shell: bash
        env:
          IB_TAR_NAME:      ${{ steps.slugs.outputs.ib_tar_name }}
          IB_MANIFEST_NAME: ${{ steps.slugs.outputs.ib_manifest_name }}
        run: |
          set -e
          SRC_TAR="$(find bin/targets -name 'openwrt-imagebuilder-*.tar.*' | head -1)"
          [ -n "$SRC_TAR" ] || { echo "::error::ImageBuilder tar not found"; exit 1; }

          mkdir -p /tmp/ib-inspect release-staging
          if [[ "$SRC_TAR" == *.zst ]]; then
            tar --use-compress-program=unzstd -xf "$SRC_TAR" -C /tmp/ib-inspect
          else
            tar -xf "$SRC_TAR" -C /tmp/ib-inspect
          fi
          IB_DIR="$(ls /tmp/ib-inspect | head -1)"

          # IB tar 内容不修改,只是改名落地到 release-staging
          cp "$SRC_TAR" "release-staging/${IB_TAR_NAME}"

          # 生成 sidecar manifest (扫描内置 ipk/apk,取裸包名)
          find "/tmp/ib-inspect/${IB_DIR}/packages/" -type f \( -name "*.ipk" -o -name "*.apk" \) \
            | xargs -n1 basename \
            | sed -E 's/\.(ipk|apk)$//' \
            | sed -E 's/_[0-9][^_]*_[a-z0-9_-]+$//' \
            | sort -u > "release-staging/${IB_MANIFEST_NAME}"

          echo "IB tar:    $(du -h release-staging/${IB_TAR_NAME} | awk '{print $1}')"
          echo "IB manifest: $(wc -l < release-staging/${IB_MANIFEST_NAME} | tr -d ' ') 个包"

      - name: Upload base release-staging
        uses: actions/upload-artifact@v7
        with:
          name: infrastructure-${{ steps.slugs.outputs.target_slug }}-${{ steps.slugs.outputs.source_slug }}
          path: release-staging/*
          retention-days: 1
