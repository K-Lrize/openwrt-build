name: "[Reusable] Firmware Package Compiler"

# Reusable: per-arch Tier3 增量编译。接收 missing 包名列表 + 完整 sdk_image tag。

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target arch (eg. aarch64_cortex-a53)，artifact 名也用'
        type: string
        required: true
      sdk_image:
        description: '完整 GHCR SDK tag，由 firmware.yml 的 Initialize 用 device_meta 算好'
        type: string
        required: true
      packages:
        description: 'JSON 字符串：要补编的裸包名数组'
        type: string
        required: true

permissions:
  contents: read
  packages: read

jobs:
  Build-Custom-Patches:
    name: Build packages
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile packages
        shell: bash
        env:
          SDK_IMAGE: ${{ inputs.sdk_image }}
          PACKAGES:  ${{ inputs.packages }}
          ARCH:      ${{ inputs.arch }}
          STRICT_VALIDATION: '0'
        run: |
          set -euo pipefail
          mkdir -p tier3-outputs pkg-out

          # Merge every device .config so defconfig 能解析 kmod 等设备级选项
          # （Tier3 不实际编 kmod，但要让 defconfig 不报缺）
          : > combined.config
          find build-config/devices/ -name ".config" -exec cat {} + >> combined.config

          jq -r '.[]' <<< "$PACKAGES" \
            | bash build-config/scripts/build/compile-in-sdk.sh \
                build-config "$SDK_IMAGE" pkg-out __all__ combined.config

          find "pkg-out/packages/${ARCH}" -type f \( -name '*.ipk' -o -name '*.apk' \) \
            -exec cp -v {} tier3-outputs/ \; 2>/dev/null || true

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: tier3-ipks-${{ inputs.arch }}
          path: tier3-outputs/
          retention-days: 1
