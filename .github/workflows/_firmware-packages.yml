name: "[Reusable] Firmware — SDK fallback compile"

# Reusable: per-arch 兜底补编。接收一组 missing 包名 (由 Aggregate-Missing 算出)
# 与 SDK tar asset 名, 走 base-rolling tarball + host-native 编译, 产出 ipk artifact
# 供 _firmware-image.yml 注入 IB packages/。
#
# 正常路径 (presets / base-config 闭包完整) 这一步矩阵为空, job 整体 skip。

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target arch (eg. aarch64_cortex-a53), artifact 名也用'
        type: string
        required: true
      sdk_tar_name:
        description: 'SDK tarball asset 名 (从 device_meta.sdk_tar_name 取)'
        type: string
        required: true
      packages:
        description: 'JSON 字符串: 要补编的裸包名数组'
        type: string
        required: true
      base_release_tag:
        description: '从哪个 release tag 下载 SDK tar (Base 层)'
        type: string
        default: 'base-rolling'

permissions:
  contents: read

jobs:
  Compile-Fallback-Patches:
    name: Compile missing packages (${{ inputs.arch }})
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Install host build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache file gawk gettext git jq \
            libncurses-dev libssl-dev python3 rsync unzip wget xsltproc \
            zlib1g-dev zstd

      - name: Download SDK tar from base-rolling
        shell: bash
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          SDK_TAR_NAME:  ${{ inputs.sdk_tar_name }}
          RELEASE_TAG:   ${{ inputs.base_release_tag }}
        run: |
          set -e
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$SDK_TAR_NAME" \
            --output "$SDK_TAR_NAME"
          mkdir -p sdk-work
          tar --use-compress-program=unzstd -xf "$SDK_TAR_NAME" \
              -C sdk-work --strip-components=1

      - name: Materialize package list + seed config
        shell: bash
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          set -e
          jq -r '.[]' <<< "$PACKAGES" > missing.txt

          # 兜底补编单包时需要 seed .config 保留所有设备的 target select 行,
          # 避免 SDK defconfig 报缺设备级 CONFIG_TARGET_*。
          : > combined.config
          find build-config/devices/ -name "target.conf" -exec cat {} + >> combined.config
          # base-config 的 kmod / =y 也并入, SDK defconfig 阶段保留内核选项联动
          [ -f build-config/common/base-config ] && cat build-config/common/base-config >> combined.config

      - name: Prepare SDK feeds (sdk/prepare.sh)
        shell: bash
        run: |
          bash build-config/scripts/sdk/prepare.sh \
            --workdir sdk-work \
            --conf-dir "$GITHUB_WORKSPACE/build-config" \
            --device __all__ \
            --packages missing.txt

      - name: Compile missing packages (sdk/compile.sh)
        shell: bash
        run: |
          mkdir -p pkg-out
          bash build-config/scripts/sdk/compile.sh \
            --workdir sdk-work \
            --packages missing.txt \
            --seed-config combined.config \
            --out pkg-out

      - name: Collect arch-specific ipk/apk
        shell: bash
        env:
          ARCH: ${{ inputs.arch }}
        run: |
          mkdir -p fallback-outputs
          find "pkg-out/packages/${ARCH}" -type f \( -name '*.ipk' -o -name '*.apk' \) \
            -exec cp -v {} fallback-outputs/ \; 2>/dev/null || true

      - name: Upload fallback ipk artifact
        uses: actions/upload-artifact@v7
        with:
          name: fallback-ipks-${{ inputs.arch }}
          path: fallback-outputs/
          retention-days: 1
