name: "[Build] Full Firmware"

# Manual full buildroot firmware path.

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device ID'
        required: true
        default: 'mt3600be'
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'K-Lrize/openwrt'
        required: true
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
        required: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    env:
      DEVICE: ${{ inputs.device }}
      CONFIG_REPO_DIR: build-config
      CCACHE_BASEDIR: ${{ github.workspace }} 
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G

    steps:
      - name: Free disk
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget qemu-utils ccache jq zstd device-tree-compiler

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Checkout OpenWrt
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.openwrt_repo }}
          ref: ${{ inputs.openwrt_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout config
        uses: actions/checkout@v6
        with:
          path: ${{ env.CONFIG_REPO_DIR }}
          persist-credentials: false

      - name: Prepare feeds and files
        run: |
          bash "${CONFIG_REPO_DIR}/scripts/sdk/prepare.sh" \
            --workdir . \
            --device "${DEVICE}"
          bash "${CONFIG_REPO_DIR}/scripts/ib/merge-files.sh" "${DEVICE}"

      - name: Compose buildroot .config
        run: |
          # 三段: target.conf (硬件 select) + base-config (kmod + 兜底库)
          # + packages.list 展开 (=y 翻译, -pkg 在 full buildroot 阶段忽略,
          #   因为 -pkg 是 IB make image PACKAGES 语法,buildroot 用 .config 决定装什么)
          cat "${CONFIG_REPO_DIR}/devices/${DEVICE}/target.conf" > .config
          echo "" >> .config
          cat "${CONFIG_REPO_DIR}/common/base-config" >> .config
          echo "" >> .config
          bash "${CONFIG_REPO_DIR}/scripts/lib/expand-packages.sh" \
              "${CONFIG_REPO_DIR}/devices/${DEVICE}/packages.list" \
              "${CONFIG_REPO_DIR}/common/presets" \
            | awk '/^\+/ { sub(/^\+/, ""); printf "CONFIG_PACKAGE_%s=y\n", $0 }' \
            >> .config

      - name: Configure build
        run: |
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          echo "CONFIG_CCACHE_DIR=\"${CCACHE_DIR}\"" >> .config
          echo "CONFIG_RUST_SCCACHE=y" >> .config
          echo "CONFIG_RUST_SCCACHE_DIR=\"${SCCACHE_DIR}\"" >> .config

          make defconfig

          bash "${CONFIG_REPO_DIR}/scripts/ib/run-image-scripts.sh" "${DEVICE}"

      - name: Hash build inputs
        id: hashes
        shell: bash
        run: |
          set -o pipefail

          # scripts/ changes do not affect toolchain binaries.
          toolchain_hash="$(
            find tools/ toolchain/ include/ -type f -print0 \
              | sort -z | xargs -0 sha256sum | sha256sum \
              | cut -d' ' -f1 | cut -c1-12
          )"

          arch="$(grep '^CONFIG_TARGET_ARCH_PACKAGES=' .config | cut -d'"' -f2 || true)"
          if [ -z "$arch" ]; then
            arch="$(grep '^CONFIG_ARCH=' .config | cut -d'"' -f2 || echo "unknown")"
          fi

          feed_hash="$(
            for d in feeds/*/; do
              git -C "$d" rev-parse HEAD 2>/dev/null || true
            done | sort | sha256sum | cut -c1-8
          )"

          {
            echo "toolchain_hash=${toolchain_hash}"
            echo "arch=${arch}"
            echo "feed_hash=${feed_hash:-nofeed}"
            echo "year_week=$(date -u +%G-W%V)"
          } >> "$GITHUB_OUTPUT"

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ env.DEVICE }}-${{ steps.hashes.outputs.year_week }}
          restore-keys: ccache-${{ runner.os }}-${{ env.DEVICE }}-

      - name: Cache sccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-${{ env.DEVICE }}-${{ steps.hashes.outputs.year_week }}
          restore-keys: sccache-${{ runner.os }}-${{ env.DEVICE }}-

      - name: Cache Toolchain
        uses: actions/cache@v5
        with:
          path: |
            staging_dir/host*
            staging_dir/toolchain-*
            build_dir/host*
            build_dir/toolchain-*
          # Share toolchain cache by arch.
          key: toolchain-${{ runner.os }}-${{ steps.hashes.outputs.arch }}-${{ steps.hashes.outputs.toolchain_hash }}

      - name: Cache language deps
        uses: actions/cache@v5
        with:
          path: |
            dl/go-mod-cache/
            dl/cargo/
          # Invalidate on feed changes.
          key: lang-${{ runner.os }}-${{ steps.hashes.outputs.feed_hash }}

      - name: Cache Tarballs
        uses: actions/cache@v5
        with:
          path: |
            dl/
            !dl/go-mod-cache/**
            !dl/cargo/**
          key: dl-${{ runner.os }}-${{ steps.hashes.outputs.year_week }}-${{ steps.hashes.outputs.feed_hash }}
          restore-keys: dl-${{ runner.os }}-${{ steps.hashes.outputs.year_week }}-

      - name: Download sources
        run: make download -j8 || make download -j1 V=s

      - name: Build tools
        run: make tools/install -j$(nproc) || make tools/install -j1 V=s

      - name: Build Toolchain
        run: make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build Firmware
        run: |
          mkdir -p $CCACHE_DIR $SCCACHE_DIR
          make -j$(nproc) BUILD_LOG=1 || make -j1 V=s
          ccache -s
          "${SCCACHE_PATH:-sccache}" -s || true

      - name: Inspect Cache Paths
        if: always()
        shell: bash
        run: |
          echo "::group::dl/ subdirs"
          find dl -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort || echo "none"
          echo "::endgroup::"

          echo "::group::toolchain sizes"
          shopt -s nullglob
          paths=(staging_dir/host* staging_dir/toolchain-* build_dir/host* build_dir/toolchain-*)
          if [ "${#paths[@]}" -gt 0 ]; then
            du -sh "${paths[@]}" || echo "none"
          else
            echo "none"
          fi
          echo "::endgroup::"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ inputs.device }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 3

      - name: Collect outputs
        run: |
          output_dir="bin/outputs"
          mkdir -p "${output_dir}"

          while IFS= read -r -d '' file; do
            filename="$(basename "$file")"
            cp -v "$file" "${output_dir}/${DEVICE}-${filename}"
          done < <(find bin/targets/ -type f \( -name "*sysupgrade*" -o -name "*factory*" -o -name "*.manifest" -o -name "profiles.json" \) -print0)

          bash "${CONFIG_REPO_DIR}/scripts/ci/checksums.sh" "${output_dir}"
          mv "${output_dir}/sha256sums.txt" "${output_dir}/${DEVICE}-sha256sums.txt"

      - name: Upload firmware
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ inputs.device }}
          path: bin/outputs/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 3
