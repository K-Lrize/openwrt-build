name: "[Rescue] Firmware — Full buildroot"

# 救援轨入口 — 用完整 buildroot 出单设备固件 (绕开 IB).
# 用途:
#   - 上游 IB tar 出问题时应急
#   - device-tree 改动冒烟测试
#   - 深度调试 (V=s 整链路日志)
#   - 未来修改 upstream 源码时 (走 K-Lrize/openwrt fork)
# 仅 workflow_dispatch 触发, 不接受 push.

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device ID (devices/<dev>/)'
        required: true
        default: 'mt3600be'
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'openwrt/openwrt'
        required: true
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
        required: true

permissions:
  contents: read

jobs:
  Build-Firmware-Full:
    name: Full buildroot firmware (${{ inputs.device }})
    runs-on: ubuntu-24.04
    env:
      DEVICE: ${{ inputs.device }}
      CONFIG_REPO_DIR: build-config
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G

    steps:
      - name: Free runner disk
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install host build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget qemu-utils ccache jq zstd device-tree-compiler

      - name: Install sccache (Rust 加速)
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Checkout OpenWrt source
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.openwrt_repo }}
          ref: ${{ inputs.openwrt_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout build-config
        uses: actions/checkout@v6
        with:
          path: ${{ env.CONFIG_REPO_DIR }}
          persist-credentials: false

      - name: Prepare feeds + merge files layer
        run: |
          set -euo pipefail
          # 1. feeds.conf: 用 common/feeds.conf (含 src-link local ./feeds/local)
          cp "${CONFIG_REPO_DIR}/common/feeds.conf" feeds.conf
          # 2. 让 ./feeds/local 指向 build-config 仓库的 feeds/local
          mkdir -p feeds
          [ -e feeds/local ] || ln -s "${CONFIG_REPO_DIR}/feeds/local" feeds/local
          # 3. 标准 feeds 拉取 + 安装
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 4. 合并 files 层
          bash "${CONFIG_REPO_DIR}/scripts/ib/merge-files.sh" "${DEVICE}"

      - name: Compose buildroot .config
        run: |
          # 直接 cp 设备单一事实源 .config (target + 全局开关 + 包 + sing-box 子选项)
          # 后面 `make defconfig` 会归一化并补全 dangling 项
          cp "${CONFIG_REPO_DIR}/devices/${DEVICE}/.config" .config

      - name: Enable ccache + sccache + run defconfig
        run: |
          echo "CONFIG_CCACHE=y" >> .config
          echo "CONFIG_CCACHE_DIR=\"${CCACHE_DIR}\"" >> .config
          echo "CONFIG_RUST_SCCACHE=y" >> .config
          echo "CONFIG_RUST_SCCACHE_DIR=\"${SCCACHE_DIR}\"" >> .config

          make defconfig

          bash "${CONFIG_REPO_DIR}/scripts/ib/run-image-scripts.sh" "${DEVICE}"

      - name: Hash build inputs (for cache keys)
        id: hashes
        shell: bash
        run: |
          set -o pipefail

          # scripts/ changes do not affect toolchain binaries.
          toolchain_hash="$(
            find tools/ toolchain/ include/ -type f -print0 \
              | sort -z | xargs -0 sha256sum | sha256sum \
              | cut -d' ' -f1 | cut -c1-12
          )"

          arch="$(grep '^CONFIG_TARGET_ARCH_PACKAGES=' .config | cut -d'"' -f2 || true)"
          if [ -z "$arch" ]; then
            arch="$(grep '^CONFIG_ARCH=' .config | cut -d'"' -f2 || echo "unknown")"
          fi

          feed_hash="$(
            for d in feeds/*/; do
              git -C "$d" rev-parse HEAD 2>/dev/null || true
            done | sort | sha256sum | cut -c1-8
          )"

          {
            echo "toolchain_hash=${toolchain_hash}"
            echo "arch=${arch}"
            echo "feed_hash=${feed_hash:-nofeed}"
            echo "year_week=$(date -u +%G-W%V)"
          } >> "$GITHUB_OUTPUT"

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ env.DEVICE }}-${{ steps.hashes.outputs.year_week }}
          restore-keys: ccache-${{ runner.os }}-${{ env.DEVICE }}-

      - name: Restore sccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-${{ env.DEVICE }}-${{ steps.hashes.outputs.year_week }}
          restore-keys: sccache-${{ runner.os }}-${{ env.DEVICE }}-

      - name: Restore toolchain cache
        uses: actions/cache@v5
        with:
          path: |
            staging_dir/host*
            staging_dir/toolchain-*
            build_dir/host*
            build_dir/toolchain-*
          # Share toolchain cache by arch.
          key: toolchain-${{ runner.os }}-${{ steps.hashes.outputs.arch }}-${{ steps.hashes.outputs.toolchain_hash }}

      - name: Restore language dep cache (Go modules + Cargo)
        uses: actions/cache@v5
        with:
          path: |
            dl/go-mod-cache/
            dl/cargo/
          # Invalidate on feed changes.
          key: lang-${{ runner.os }}-${{ steps.hashes.outputs.feed_hash }}

      - name: Restore source tarballs cache
        uses: actions/cache@v5
        with:
          path: |
            dl/
            !dl/go-mod-cache/**
            !dl/cargo/**
          key: dl-${{ runner.os }}-${{ steps.hashes.outputs.year_week }}-${{ steps.hashes.outputs.feed_hash }}
          restore-keys: dl-${{ runner.os }}-${{ steps.hashes.outputs.year_week }}-

      - name: Download sources
        run: make download -j8 || make download -j1 V=s

      - name: Build host tools
        run: make tools/install -j$(nproc) || make tools/install -j1 V=s

      - name: Build toolchain
        run: make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build firmware
        run: |
          mkdir -p $CCACHE_DIR $SCCACHE_DIR
          make -j$(nproc) BUILD_LOG=1 || make -j1 V=s
          ccache -s
          "${SCCACHE_PATH:-sccache}" -s || true

      - name: Inspect cache paths
        if: always()
        shell: bash
        run: |
          echo "::group::dl/ subdirs"
          find dl -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort || echo "none"
          echo "::endgroup::"

          echo "::group::toolchain sizes"
          shopt -s nullglob
          paths=(staging_dir/host* staging_dir/toolchain-* build_dir/host* build_dir/toolchain-*)
          if [ "${#paths[@]}" -gt 0 ]; then
            du -sh "${paths[@]}" || echo "none"
          else
            echo "none"
          fi
          echo "::endgroup::"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ inputs.device }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 3

      - name: Collect firmware outputs + checksums
        run: |
          output_dir="bin/outputs"
          mkdir -p "${output_dir}"

          while IFS= read -r -d '' file; do
            filename="$(basename "$file")"
            cp -v "$file" "${output_dir}/${DEVICE}-${filename}"
          done < <(find bin/targets/ -type f \( -name "*sysupgrade*" -o -name "*factory*" -o -name "*.manifest" -o -name "profiles.json" \) -print0)

          bash "${CONFIG_REPO_DIR}/scripts/ci/checksums.sh" "${output_dir}"
          mv "${output_dir}/sha256sums.txt" "${output_dir}/${DEVICE}-sha256sums.txt"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ inputs.device }}
          path: bin/outputs/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 3
