name: "[Build] Incremental Firmware"

# Incremental firmware build and release.

permissions:
  contents: write
  packages: write
  actions: read

env:
  RELEASE_TAG: rolling
  DEFAULT_OPENWRT_REF: main
  DEFAULT_OPENWRT_REPO: K-Lrize/openwrt

on:
  push:
    branches: [main]
    paths:
      - 'devices/**'
      - 'common/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'K-Lrize/openwrt'
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'

jobs:
  Initialize:
    name: Prepare
    runs-on: ubuntu-24.04
    outputs:
      device_matrix:        ${{ steps.matrix.outputs.device_matrix }}
      device_meta:          ${{ steps.matrix.outputs.device_meta }}
      has_builds:           ${{ steps.matrix.outputs.has_builds }}
      source_slug:          ${{ steps.matrix.outputs.source_slug }}
      pool_manifest_name:   ${{ steps.matrix.outputs.pool_manifest_name }}
      openwrt_ref:          ${{ steps.echo.outputs.openwrt_ref }}
      openwrt_repo:         ${{ steps.echo.outputs.openwrt_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Echo source inputs
        id: echo
        shell: bash
        run: |
          openwrt_ref="${{ inputs.openwrt_ref || env.DEFAULT_OPENWRT_REF }}"
          openwrt_repo="${{ inputs.openwrt_repo || env.DEFAULT_OPENWRT_REPO }}"
          {
            echo "openwrt_ref=${openwrt_ref}"
            echo "openwrt_repo=${openwrt_repo}"
          } >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        env:
          OPENWRT_REPO: ${{ steps.echo.outputs.openwrt_repo }}
          OPENWRT_REF:  ${{ steps.echo.outputs.openwrt_ref }}
        run: bash scripts/ci/calculate-matrix.sh

  Analyze-Diff:
    name: Analyze packages
    needs: Initialize
    if: needs.Initialize.outputs.has_builds == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.Initialize.outputs.device_matrix) }}
    steps:
      - name: Checkout config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Download manifest sidecars
        shell: bash
        env:
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          IB_MANIFEST_NAME:    ${{ fromJSON(needs.Initialize.outputs.device_meta)[matrix.device].ib_manifest_name }}
          POOL_MANIFEST_NAME:  ${{ needs.Initialize.outputs.pool_manifest_name }}
          RELEASE_TAG:         ${{ env.RELEASE_TAG }}
        run: |
          set -e
          # Tier1: IB sidecar manifest (强依赖,缺则 fail)
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$IB_MANIFEST_NAME" \
            --output ib.manifest.txt

          # Tier2: Pool sidecar manifest (软依赖,首次构建可能还没 pool)
          if ! gh release download "$RELEASE_TAG" \
                 --repo "$GITHUB_REPOSITORY" \
                 --pattern "$POOL_MANIFEST_NAME" \
                 --output pool.manifest.txt 2>/dev/null; then
            echo "::warning::Pool manifest ${POOL_MANIFEST_NAME} 未发布,Tier2 清单按空处理。"
            : > pool.manifest.txt
          fi

      - name: Find missing packages
        id: diff
        shell: bash
        env:
          DEVICE: ${{ matrix.device }}
        run: |
          bash build-config/scripts/firmware/analyze-diff.sh \
            --config "build-config/devices/${DEVICE}/.config" \
            --ib-manifest ib.manifest.txt \
            --pool-manifest pool.manifest.txt \
            --output "${DEVICE}.json"

      - name: Upload package diff
        uses: actions/upload-artifact@v7
        with:
          name: missing-info-${{ matrix.device }}
          path: ${{ matrix.device }}.json

  Aggregate-Patches:
    name: Merge package diffs
    needs: [Initialize, Analyze-Diff]
    runs-on: ubuntu-24.04
    outputs:
      arch_packages_matrix: ${{ steps.merge.outputs.matrix }}
    steps:
      - name: Checkout config
        uses: actions/checkout@v6

      - name: Download package diffs
        uses: actions/download-artifact@v8
        with:
          pattern: missing-info-*
          path: all-missing/
          merge-multiple: true

      - name: Merge by arch
        id: merge
        shell: bash
        run: |
          bash scripts/ci/merge-missing-info.sh \
            all-missing \
            '${{ needs.Initialize.outputs.device_meta }}'

  Compile-Patches:
    name: Compile packages
    needs: [Initialize, Aggregate-Patches]
    if: needs.Aggregate-Patches.outputs.arch_packages_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        arch_data: ${{ fromJSON(needs.Aggregate-Patches.outputs.arch_packages_matrix) }}
    uses: ./.github/workflows/_firmware-packages.yml
    with:
      arch:          ${{ matrix.arch_data.key }}
      packages:      ${{ toJSON(matrix.arch_data.value) }}
      sdk_tar_name:  ${{ matrix.arch_data.sdk_tar_name }}
      release_tag:   rolling

  Assemble-Firmware:
    name: Assemble firmware
    needs: [Initialize, Compile-Patches]
    if: always() && needs.Initialize.outputs.has_builds == 'true'
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.Initialize.outputs.device_matrix) }}
    uses: ./.github/workflows/_firmware-image.yml
    with:
      device:         ${{ matrix.device }}
      arch:           ${{ fromJSON(needs.Initialize.outputs.device_meta)[matrix.device].arch }}
      ib_tar_name:    ${{ fromJSON(needs.Initialize.outputs.device_meta)[matrix.device].ib_tar_name }}
      pool_tar_name:  ${{ fromJSON(needs.Initialize.outputs.device_meta)[matrix.device].pool_tar_name }}
      release_tag:    rolling

  Publish-Release:
    name: Publish release
    needs: [Initialize, Assemble-Firmware]
    if: always() && needs.Initialize.outputs.has_builds == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download firmware
        uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          path: artifacts/
          merge-multiple: true

      - name: Update rolling release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/**/*
          prerelease: true
          make_latest: true
