name: "[Build] Firmware"

# 主轨 — 拉 IB / 编自有 feed / 装包出 image.
# 每个 device 自己声明 IB / SDK URL (devices/<dev>/.config 顶部
# `# ib-url:` + `# sdk-url:` 注释), 来源可以是上游 snapshot / release /
# 自建 release asset. 所有 URL 都走 curl 拉, 来源等价.
#
# 触发:
#   - push: devices/** / common/** / scripts/build/** / scripts/ib/** /
#           scripts/lib/** / scripts/ci/{calculate-matrix,checksums}.sh /
#           .github/workflows/firmware.yml / _firmware-image.yml
#   - workflow_dispatch (可临时覆盖 IB / SDK URL, 调试用)
#   - schedule (月度跑一次抓最新上游 snapshot)

on:
  push:
    branches: [main]
    paths:
      - 'devices/**'
      - 'common/**'
      - 'feeds/local/**'
      - 'scripts/build/**'
      - 'scripts/ib/**'
      - 'scripts/lib/**'
      - 'scripts/ci/calculate-matrix.sh'
      - 'scripts/ci/checksums.sh'
      - '.github/workflows/firmware.yml'
      - '.github/workflows/_firmware-image.yml'
  workflow_dispatch:
    inputs:
      ib_url:
        description: 'IB tar URL (临时覆盖 device 默认; 空则用 device 注释)'
        required: false
        default: ''
      sdk_url:
        description: 'SDK tar URL (临时覆盖)'
        required: false
        default: ''
  schedule:
    - cron: '0 0 15 * *'

permissions:
  contents: write
  actions: read

env:
  FIRMWARE_RELEASE_TAG: firmware-rolling

jobs:
  Initialize:
    name: Compute device matrix
    runs-on: ubuntu-24.04
    outputs:
      device_matrix: ${{ steps.matrix.outputs.device_matrix }}
      has_builds:    ${{ steps.matrix.outputs.has_builds }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: matrix
        run: bash scripts/ci/calculate-matrix.sh

  Assemble-Firmware:
    name: Assemble (${{ matrix.device }})
    needs: Initialize
    if: needs.Initialize.outputs.has_builds == 'true'
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.Initialize.outputs.device_matrix) }}
    uses: ./.github/workflows/_firmware-image.yml
    with:
      device:  ${{ matrix.device }}
      ib_url:  ${{ inputs.ib_url  || '' }}
      sdk_url: ${{ inputs.sdk_url || '' }}

  Publish:
    name: Publish to firmware-rolling
    needs: [Initialize, Assemble-Firmware]
    if: always() && needs.Initialize.outputs.has_builds == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          path: artifacts/
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.FIRMWARE_RELEASE_TAG }}
          files: artifacts/**/*
          prerelease: true
          make_latest: true
