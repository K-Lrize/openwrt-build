name: "[Build] Incremental Firmware"

# Incremental firmware build and release.

permissions:
  contents: write
  packages: write
  actions: read

env:
  RELEASE_TAG: rolling
  DEFAULT_OPENWRT_REF: main
  DEFAULT_OPENWRT_REPO: K-Lrize/openwrt

on:
  push:
    branches: [main]
    paths:
      - 'devices/**'
      - 'common/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'K-Lrize/openwrt'
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'

jobs:
  Initialize:
    name: Prepare
    runs-on: ubuntu-24.04
    outputs:
      device_matrix:   ${{ steps.matrix.outputs.device_matrix }}
      device_meta:     ${{ steps.matrix.outputs.device_meta }}
      has_builds:      ${{ steps.matrix.outputs.has_builds }}
      pool_image:      ${{ steps.matrix.outputs.pool_image }}
      source_slug:     ${{ steps.matrix.outputs.source_slug }}
      openwrt_ref:     ${{ steps.echo.outputs.openwrt_ref }}
      openwrt_repo:    ${{ steps.echo.outputs.openwrt_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Echo source inputs
        id: echo
        shell: bash
        run: |
          openwrt_ref="${{ inputs.openwrt_ref || env.DEFAULT_OPENWRT_REF }}"
          openwrt_repo="${{ inputs.openwrt_repo || env.DEFAULT_OPENWRT_REPO }}"
          {
            echo "openwrt_ref=${openwrt_ref}"
            echo "openwrt_repo=${openwrt_repo}"
          } >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        env:
          OPENWRT_REPO: ${{ steps.echo.outputs.openwrt_repo }}
          OPENWRT_REF:  ${{ steps.echo.outputs.openwrt_ref }}
        run: bash scripts/ci/calculate-matrix.sh

  Analyze-Diff:
    name: Analyze packages
    needs: Initialize
    if: needs.Initialize.outputs.has_builds == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.Initialize.outputs.device_matrix) }}
    steps:
      - name: Checkout config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Find missing packages
        id: diff
        shell: bash
        env:
          IB_IMAGE:   ${{ fromJSON(needs.Initialize.outputs.device_meta)[matrix.device].ib_image }}
          POOL_IMAGE: ${{ needs.Initialize.outputs.pool_image }}
          DEVICE:     ${{ matrix.device }}
        run: |
          bash build-config/scripts/ci/analyze-diff.sh \
            "build-config/devices/${DEVICE}/.config" \
            "$IB_IMAGE" \
            "$POOL_IMAGE" \
            "${DEVICE}.json"

      - name: Upload package diff
        uses: actions/upload-artifact@v7
        with:
          name: missing-info-${{ matrix.device }}
          path: ${{ matrix.device }}.json

  Aggregate-Patches:
    name: Merge package diffs
    needs: [Initialize, Analyze-Diff]
    runs-on: ubuntu-24.04
    outputs:
      arch_packages_matrix: ${{ steps.merge.outputs.matrix }}
    steps:
      - name: Checkout config
        uses: actions/checkout@v6

      - name: Download package diffs
        uses: actions/download-artifact@v8
        with:
          pattern: missing-info-*
          path: all-missing/
          merge-multiple: true

      - name: Merge by arch
        id: merge
        shell: bash
        run: |
          bash scripts/ci/merge-missing-info.sh \
            all-missing \
            '${{ needs.Initialize.outputs.device_meta }}'

  Compile-Patches:
    name: Compile packages
    needs: [Initialize, Aggregate-Patches]
    if: needs.Aggregate-Patches.outputs.arch_packages_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        arch_data: ${{ fromJSON(needs.Aggregate-Patches.outputs.arch_packages_matrix) }}
    uses: ./.github/workflows/_firmware-packages.yml
    with:
      arch:      ${{ matrix.arch_data.key }}
      packages:  ${{ toJSON(matrix.arch_data.value) }}
      sdk_image: ${{ matrix.arch_data.sdk_image }}

  Assemble-Firmware:
    name: Assemble firmware
    needs: [Initialize, Compile-Patches]
    if: always() && needs.Initialize.outputs.has_builds == 'true'
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.Initialize.outputs.device_matrix) }}
    uses: ./.github/workflows/_firmware-image.yml
    with:
      device:     ${{ matrix.device }}
      arch:       ${{ fromJSON(needs.Initialize.outputs.device_meta)[matrix.device].arch }}
      ib_image:   ${{ fromJSON(needs.Initialize.outputs.device_meta)[matrix.device].ib_image }}
      pool_image: ${{ needs.Initialize.outputs.pool_image }}

  Publish-Release:
    name: Publish release
    needs: [Initialize, Assemble-Firmware]
    if: always() && needs.Initialize.outputs.has_builds == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download firmware
        uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          path: artifacts/
          merge-multiple: true

      - name: Update rolling release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/**/*
          prerelease: true
          make_latest: true
