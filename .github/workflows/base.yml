name: "[Build] Base SDK & ImageBuilder"

# Build SDK, ImageBuilder, and package-pool images.

permissions:
  contents: write
  packages: write
  actions: read

env:
  RELEASE_TAG: rolling
  DEFAULT_OPENWRT_REF: main
  DEFAULT_OPENWRT_REPO: K-Lrize/openwrt

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'K-Lrize/openwrt'
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
  schedule:
    - cron: '0 0 1,15 * *'

jobs:
  Initialize:
    name: Prepare
    runs-on: ubuntu-24.04
    outputs:
      target_matrix: ${{ steps.matrix.outputs.target_matrix }}
      owner_lc:      ${{ steps.slugs.outputs.owner_lc }}
      repo_name_lc:  ${{ steps.slugs.outputs.repo_name_lc }}
      ref_slug:      ${{ steps.slugs.outputs.ref_slug }}
      openwrt_ref:   ${{ steps.slugs.outputs.openwrt_ref }}
      openwrt_repo:  ${{ steps.slugs.outputs.openwrt_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build matrix
        id: matrix
        run: bash scripts/ci/calculate-matrix.sh

      - name: Compute names
        id: slugs
        shell: bash
        run: |
          source scripts/lib/slugify.sh
          openwrt_ref="${{ inputs.openwrt_ref || env.DEFAULT_OPENWRT_REF }}"
          openwrt_repo="${{ inputs.openwrt_repo || env.DEFAULT_OPENWRT_REPO }}"
          echo "openwrt_ref=${openwrt_ref}" >> "$GITHUB_OUTPUT"
          echo "openwrt_repo=${openwrt_repo}" >> "$GITHUB_OUTPUT"
          echo "ref_slug=$(slugify "$openwrt_ref")" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "repo_name_lc=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  Build-Base:
    name: Build base
    needs: Initialize
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.Initialize.outputs.target_matrix) }}
    uses: ./.github/workflows/_base-target.yml
    with:
      openwrt_repo: ${{ needs.Initialize.outputs.openwrt_repo }}
      openwrt_ref:  ${{ needs.Initialize.outputs.openwrt_ref }}
      target:       ${{ matrix.target }}

  Finalize-Pool:
    name: Publish package pool
    needs: [Initialize, Build-Base]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    env:
      OWNER_LC:     ${{ needs.Initialize.outputs.owner_lc }}
      REPO_NAME_LC: ${{ needs.Initialize.outputs.repo_name_lc }}
      REF_SLUG:     ${{ needs.Initialize.outputs.ref_slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download pool chunks
        uses: actions/download-artifact@v8
        with:
          pattern: pool-chunk-*
          path: pool/
          merge-multiple: true

      - name: Download base tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: infrastructure-*
          path: infra-assets/
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push package pool
        shell: bash
        run: |
          source scripts/lib/slugify.sh
          TARGET_SLUG=$(slugify "$(echo '${{ needs.Initialize.outputs.target_matrix }}' | jq -r '.[0]')")
          PREFIX="ghcr.io/${OWNER_LC}/${REPO_NAME_LC}"
          SDK_IMAGE="${PREFIX}:sdk-${TARGET_SLUG}-${REF_SLUG}"
          POOL_IMAGE="${PREFIX}:packages-${REF_SLUG}"

          bash scripts/ci/finalize-pool.sh "pool" "." "$POOL_IMAGE" "$SDK_IMAGE"

      - name: Update rolling release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            global-manifest.txt
            infra-assets/**/*
          prerelease: true
          make_latest: true
