name: "[Build] Base SDK & ImageBuilder"

# Base 轨入口 — per target 跑完整 buildroot, 产出 SDK + IB tarball 推 base-rolling,
# 末尾用 gh CLI 触发 pool-update.yml 重建 (SDK 变了 → pool 必须跟着重建)。
# Pool 失败不污染本工作流的红绿态 (物理分两个 run)。
#
# 触发:
#   - push: common/base-config / feeds / scripts/sdk / _base-target.yml / base.yml
#   - schedule: 每月 1 号与 15 号 (跟进上游)
#   - workflow_dispatch
#
# 产物 (release tag = base-rolling):
#   sdk-<target>-<source>.tar.zst
#   ib-<target>-<source>.tar.zst
#   ib-<target>-<source>.manifest.txt

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'openwrt/openwrt'
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
  push:
    branches: [main]
    paths:
      - 'common/base-config'
      - 'common/feeds.conf'
      - 'feeds/local/**'
      - 'scripts/sdk/**'
      - 'scripts/lib/**'
      - 'scripts/ci/calculate-matrix.sh'
      - '.github/workflows/_base-target.yml'
      - '.github/workflows/base.yml'
  schedule:
    - cron: '0 0 1,15 * *'

permissions:
  contents: write
  actions: read

env:
  BASE_RELEASE_TAG: base-rolling
  DEFAULT_OPENWRT_REF: main
  DEFAULT_OPENWRT_REPO: openwrt/openwrt

jobs:
  Initialize:
    name: Compute build matrix
    runs-on: ubuntu-24.04
    outputs:
      target_matrix:  ${{ steps.matrix.outputs.target_matrix }}
      source_slug:    ${{ steps.matrix.outputs.source_slug }}
      openwrt_ref:    ${{ steps.matrix.outputs.openwrt_ref }}
      openwrt_repo:   ${{ steps.matrix.outputs.openwrt_repo }}
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6

      - name: Compute target matrix + asset names
        id: matrix
        env:
          OPENWRT_REPO: ${{ inputs.openwrt_repo || env.DEFAULT_OPENWRT_REPO }}
          OPENWRT_REF:  ${{ inputs.openwrt_ref || env.DEFAULT_OPENWRT_REF }}
        run: |
          # 把上游 repo/ref 透传给下游 job (避免每个 job 各自从 inputs 派生)
          {
            echo "openwrt_repo=${OPENWRT_REPO}"
            echo "openwrt_ref=${OPENWRT_REF}"
          } >> "$GITHUB_OUTPUT"

          bash scripts/ci/calculate-matrix.sh

  Build-Base:
    name: Build SDK + IB per target
    needs: Initialize
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.Initialize.outputs.target_matrix) }}
    uses: ./.github/workflows/_base-target.yml
    with:
      openwrt_repo: ${{ needs.Initialize.outputs.openwrt_repo }}
      openwrt_ref:  ${{ needs.Initialize.outputs.openwrt_ref }}
      target:       ${{ matrix.target }}

  Publish-Base-Release:
    name: Publish SDK / IB tarballs to base-rolling
    needs: [Initialize, Build-Base]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6

      - name: Download per-target base artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: infrastructure-*-${{ needs.Initialize.outputs.source_slug }}
          path: infra-assets/
          merge-multiple: true

      - name: Upload to release tag (${{ env.BASE_RELEASE_TAG }})
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BASE_RELEASE_TAG }}
          files: |
            infra-assets/**/*
          prerelease: true
          make_latest: false

  Trigger-Pool-Update:
    # Pool 编译跟 SDK/IB 是两种产物, 单独走 pool-update.yml — 这样:
    #   1. 修改 packages.txt 不会重编 SDK
    #   2. Pool 失败不染红 base 工作流
    # 这里 Base 完成后用 gh CLI 触发 pool 重建 (SDK 变了, pool 必须跟着重建)。
    name: Trigger pool-update.yml
    needs: [Initialize, Build-Base]
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6

      - name: Dispatch pool-update.yml
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          OPENWRT_REPO: ${{ needs.Initialize.outputs.openwrt_repo }}
          OPENWRT_REF:  ${{ needs.Initialize.outputs.openwrt_ref }}
        run: |
          set -euo pipefail
          # GITHUB_TOKEN 允许触发 workflow_dispatch (GHA 安全策略的明文例外)
          gh workflow run pool-update.yml \
            --ref "${GITHUB_REF}" \
            -f "openwrt_repo=${OPENWRT_REPO}" \
            -f "openwrt_ref=${OPENWRT_REF}" \
            -f strict=true \
            -f update_release=true
          echo "::notice::已触发 pool-update.yml — 在 Actions 页查看进度, 失败时可独立重新 dispatch (拿最新分支 config)。"
