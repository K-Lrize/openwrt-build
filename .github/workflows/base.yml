name: "[Build] Base SDK & ImageBuilder"

# Build SDK + ImageBuilder per target, publish base tarballs, and trigger
# pool update in a separate run (so Pool failures never taint this workflow).

permissions:
  contents: write
  actions: read

env:
  BASE_RELEASE_TAG: base-rolling
  DEFAULT_OPENWRT_REF: main
  DEFAULT_OPENWRT_REPO: K-Lrize/openwrt

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'K-Lrize/openwrt'
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
  schedule:
    - cron: '0 0 1,15 * *'

jobs:
  Initialize:
    name: Prepare
    runs-on: ubuntu-24.04
    outputs:
      target_matrix:              ${{ steps.matrix.outputs.target_matrix }}
      target_matrix_with_meta:    ${{ steps.matrix.outputs.target_matrix_with_meta }}
      source_slug:                ${{ steps.matrix.outputs.source_slug }}
      pool_manifest_name:         ${{ steps.matrix.outputs.pool_manifest_name }}
      first_target_sdk_tar_name:  ${{ steps.matrix.outputs.first_target_sdk_tar_name }}
      owner_lc:                   ${{ steps.matrix.outputs.owner_lc }}
      repo_name_lc:               ${{ steps.matrix.outputs.repo_name_lc }}
      openwrt_ref:                ${{ steps.echo.outputs.openwrt_ref }}
      openwrt_repo:               ${{ steps.echo.outputs.openwrt_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Echo source inputs
        id: echo
        shell: bash
        run: |
          openwrt_ref="${{ inputs.openwrt_ref || env.DEFAULT_OPENWRT_REF }}"
          openwrt_repo="${{ inputs.openwrt_repo || env.DEFAULT_OPENWRT_REPO }}"
          {
            echo "openwrt_ref=${openwrt_ref}"
            echo "openwrt_repo=${openwrt_repo}"
          } >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        env:
          OPENWRT_REPO: ${{ steps.echo.outputs.openwrt_repo }}
          OPENWRT_REF:  ${{ steps.echo.outputs.openwrt_ref }}
        run: bash scripts/ci/calculate-matrix.sh

  Build-Base:
    name: Build base
    needs: Initialize
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.Initialize.outputs.target_matrix) }}
    uses: ./.github/workflows/_base-target.yml
    with:
      openwrt_repo: ${{ needs.Initialize.outputs.openwrt_repo }}
      openwrt_ref:  ${{ needs.Initialize.outputs.openwrt_ref }}
      target:       ${{ matrix.target }}

  Publish-Infrastructure-Assets:
    name: Publish SDK/IB tarballs
    needs: [Initialize, Build-Base]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download base tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: infrastructure-*-${{ needs.Initialize.outputs.source_slug }}
          path: infra-assets/
          merge-multiple: true

      - name: Update base release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BASE_RELEASE_TAG }}
          files: |
            infra-assets/**/*
          prerelease: true
          make_latest: false

  # Pool 编译已物理拆出到 pool-update.yml（独立 workflow_dispatch run）。
  # GHA 不允许 reusable workflow caller 加 continue-on-error，本 job 用 gh CLI
  # 触发 pool-update.yml 后立即返回——Pool 真正成败由那个独立 run 承载，
  # 不会污染本 workflow 的红绿态。修复 config 后也可直接手动重新 dispatch。
  Trigger-Pool-Update:
    name: Trigger pool update
    needs: [Initialize, Build-Base]
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dispatch pool-update.yml
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          OPENWRT_REPO: ${{ needs.Initialize.outputs.openwrt_repo }}
          OPENWRT_REF:  ${{ needs.Initialize.outputs.openwrt_ref }}
        run: |
          set -euo pipefail
          # GITHUB_TOKEN 允许触发 workflow_dispatch（GHA 安全策略的明文例外）。
          gh workflow run pool-update.yml \
            --ref "${GITHUB_REF}" \
            -f "openwrt_repo=${OPENWRT_REPO}" \
            -f "openwrt_ref=${OPENWRT_REF}" \
            -f strict=true \
            -f update_release=true
          echo "::notice::已触发 pool-update.yml — 在 Actions 页查看进度，失败时可独立重新 dispatch（拿最新分支 config）。"
