name: "[Reusable] Firmware Image Generator"

# Reusable: assemble one device firmware image. 走 release tarball + host-native:
#   gh release download IB tar + pool tar → tar -xf → ib/prepare-repo → ib/make-image
# Tier3 补编的 ipk 通过 artifact 拿到本地,与 pool 解压结果合并喂给 ib/prepare-repo。

on:
  workflow_call:
    inputs:
      device:
        type: string
        required: true
      arch:
        type: string
        required: true
      ib_tar_name:
        description: 'IB tarball asset 名 (从 device_meta.ib_tar_name 取)'
        type: string
        required: true
      pool_tar_name:
        description: 'Pool tarball asset 名 (从 device_meta.pool_tar_name 取)'
        type: string
        required: true
      base_release_tag:
        description: '从哪个 release 下载 IB tar (Base 层)'
        type: string
        default: 'base-rolling'
      pool_release_tag:
        description: '从哪个 release 下载 pool tar (Pool 层)'
        type: string
        default: 'pool-rolling'

permissions:
  contents: read

jobs:
  Assemble-Firmware:
    name: Assemble image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Install host deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ca-certificates file gawk gettext git jq libncurses-dev \
            perl python3 rsync signify-openbsd unzip wget xz-utils zlib1g zstd

      - name: Download tier3 packages
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: tier3-ipks-${{ inputs.arch }}
          path: tier3-packages/

      - name: Download IB tarball
        shell: bash
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          IB_TAR_NAME:  ${{ inputs.ib_tar_name }}
          RELEASE_TAG:  ${{ inputs.base_release_tag }}
        run: |
          set -e
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$IB_TAR_NAME" \
            --output "$IB_TAR_NAME"
          mkdir -p ib-work
          tar --use-compress-program=unzstd -xf "$IB_TAR_NAME" \
              -C ib-work --strip-components=1

      - name: Download pool tarball
        shell: bash
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          POOL_TAR_NAME:   ${{ inputs.pool_tar_name }}
          RELEASE_TAG:     ${{ inputs.pool_release_tag }}
        run: |
          set -e
          mkdir -p tier2-packages
          if ! gh release download "$RELEASE_TAG" \
                 --repo "$GITHUB_REPOSITORY" \
                 --pattern "$POOL_TAR_NAME" \
                 --output "$POOL_TAR_NAME" 2>/dev/null; then
            echo "::warning::Pool tar ${POOL_TAR_NAME} 未发布 (Tier2 按空处理)。"
          else
            tar --use-compress-program=unzstd -xf "$POOL_TAR_NAME" -C tier2-packages
          fi

      - name: Stage unified package directory
        shell: bash
        run: |
          set -e
          mkdir -p unified_repo
          find tier2-packages/ tier3-packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) \
            -exec cp -v {} unified_repo/ \; 2>/dev/null || true
          echo "unified_repo: $(find unified_repo -maxdepth 1 -type f | wc -l | tr -d ' ') 个 ipk/apk"

      - name: Register local feed in IB
        shell: bash
        run: |
          bash build-config/scripts/ib/prepare-repo.sh \
            --workdir ib-work \
            --packages-dir unified_repo

      - name: Build firmware image
        shell: bash
        env:
          DEVICE: ${{ inputs.device }}
        run: |
          set -e
          source build-config/scripts/lib/extract-config.sh
          source build-config/scripts/lib/expand-packages.sh
          DEVICE_DIR="build-config/devices/${DEVICE}"
          PROFILE=$(extract_profile "$DEVICE_DIR/target.conf")
          PACKAGES=$(expand_packages_for_ib "$DEVICE_DIR/packages.list" "build-config/common/presets")

          bash build-config/scripts/ib/make-image.sh \
            --workdir ib-work \
            --conf-dir "$GITHUB_WORKSPACE/build-config" \
            --device "$DEVICE" \
            --profile "$PROFILE" \
            --packages "$PACKAGES" \
            --out bin-targets

      - name: Collect outputs
        shell: bash
        env:
          DEVICE: ${{ inputs.device }}
        run: |
          output_dir="bin/outputs"
          mkdir -p "${output_dir}"
          find bin-targets/ -type f \( -name "*sysupgrade*" -o -name "*factory*" -o -name "*.manifest" -o -name "profiles.json" \) | while read -r file; do
            filename=$(basename "$file")
            cp -v "$file" "${output_dir}/${DEVICE}-${filename}"
          done
          bash build-config/scripts/ci/checksums.sh "${output_dir}"
          mv "${output_dir}/sha256sums.txt" "${output_dir}/${DEVICE}-sha256sums.txt"

      - name: Upload firmware
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ inputs.device }}
          path: bin/outputs/*
          if-no-files-found: error
          retention-days: 3
