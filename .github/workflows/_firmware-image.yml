name: "[Reusable] Firmware — Assemble image"

# Reusable: 组装一台设备的固件 image。走 release tarball + host-native:
#   gh release download IB tar + pool tar → tar -xf →
#     ib/prepare-repo (合并 pool 包 + fallback 补编 ipk 进 IB packages/) →
#     ib/make-image (IB make image PROFILE=... PACKAGES=...)

on:
  workflow_call:
    inputs:
      device:
        type: string
        required: true
      arch:
        type: string
        required: true
      ib_tar_name:
        description: 'IB tarball asset 名 (从 device_meta.ib_tar_name 取)'
        type: string
        required: true
      pool_tar_name:
        description: 'Pool tarball asset 名 (从 device_meta.pool_tar_name 取)'
        type: string
        required: true
      base_release_tag:
        description: '从哪个 release 下载 IB tar (Base 层)'
        type: string
        default: 'base-rolling'
      pool_release_tag:
        description: '从哪个 release 下载 pool tar (Pool 层)'
        type: string
        default: 'pool-rolling'

permissions:
  contents: read

jobs:
  Assemble-Firmware:
    name: Assemble image (${{ inputs.device }})
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Install IB host deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ca-certificates file gawk gettext git jq libncurses-dev \
            perl python3 rsync signify-openbsd unzip wget xz-utils zlib1g zstd

      - name: Download fallback ipk artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: fallback-ipks-${{ inputs.arch }}
          path: fallback-packages/

      - name: Download IB tar from base-rolling
        shell: bash
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          IB_TAR_NAME:  ${{ inputs.ib_tar_name }}
          RELEASE_TAG:  ${{ inputs.base_release_tag }}
        run: |
          set -e
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$IB_TAR_NAME" \
            --output "$IB_TAR_NAME"
          mkdir -p ib-work
          tar --use-compress-program=unzstd -xf "$IB_TAR_NAME" \
              -C ib-work --strip-components=1

      - name: Download pool tar from pool-rolling
        shell: bash
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          POOL_TAR_NAME:   ${{ inputs.pool_tar_name }}
          RELEASE_TAG:     ${{ inputs.pool_release_tag }}
        run: |
          set -e
          mkdir -p pool-packages
          if ! gh release download "$RELEASE_TAG" \
                 --repo "$GITHUB_REPOSITORY" \
                 --pattern "$POOL_TAR_NAME" \
                 --output "$POOL_TAR_NAME" 2>/dev/null; then
            echo "::warning::Pool tar ${POOL_TAR_NAME} 未发布 (按空处理)。"
          else
            tar --use-compress-program=unzstd -xf "$POOL_TAR_NAME" -C pool-packages
          fi

      - name: Merge pool + fallback into unified package dir
        shell: bash
        run: |
          set -e
          mkdir -p unified_repo
          find pool-packages/ fallback-packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) \
            -exec cp -v {} unified_repo/ \; 2>/dev/null || true
          echo "unified_repo: $(find unified_repo -maxdepth 1 -type f | wc -l | tr -d ' ') 个 ipk/apk"

      - name: Inject merged repo into IB (ib/prepare-repo.sh)
        shell: bash
        run: |
          bash build-config/scripts/ib/prepare-repo.sh \
            --workdir ib-work \
            --packages-dir unified_repo

      - name: Build firmware image (ib/make-image.sh)
        shell: bash
        env:
          DEVICE: ${{ inputs.device }}
        run: |
          set -e
          source build-config/scripts/lib/extract-config.sh
          source build-config/scripts/lib/expand-packages.sh
          DEVICE_DIR="build-config/devices/${DEVICE}"
          PROFILE=$(extract_profile "$DEVICE_DIR/target.conf")
          PACKAGES=$(expand_packages_for_ib "$DEVICE_DIR/packages.list" "build-config/common/presets")

          bash build-config/scripts/ib/make-image.sh \
            --workdir ib-work \
            --conf-dir "$GITHUB_WORKSPACE/build-config" \
            --device "$DEVICE" \
            --profile "$PROFILE" \
            --packages "$PACKAGES" \
            --out bin-targets

      - name: Collect firmware outputs + checksums
        shell: bash
        env:
          DEVICE: ${{ inputs.device }}
        run: |
          output_dir="bin/outputs"
          mkdir -p "${output_dir}"
          find bin-targets/ -type f \( -name "*sysupgrade*" -o -name "*factory*" -o -name "*.manifest" -o -name "profiles.json" \) | while read -r file; do
            filename=$(basename "$file")
            cp -v "$file" "${output_dir}/${DEVICE}-${filename}"
          done
          bash build-config/scripts/ci/checksums.sh "${output_dir}"
          mv "${output_dir}/sha256sums.txt" "${output_dir}/${DEVICE}-sha256sums.txt"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ inputs.device }}
          path: bin/outputs/*
          if-no-files-found: error
          retention-days: 3
