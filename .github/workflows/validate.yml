name: "[CI] Validate configuration"

# CI 轨 — lint + defconfig dry-run, 不出固件。
#   1. Lint-Presets  static 检查 presets/*.list 与 devices/*/{target.conf,packages.list}
#   2. Validate      per device 跑 SDK defconfig, 校验种子 =y 行是否保留
#
# 触发: push / pull_request 改动配置类文件; workflow_dispatch 可单设备调试。

on:
  push:
    paths:
      - 'common/presets/**'
      - 'common/base-config'
      - 'common/feeds.conf'
      - 'devices/**/target.conf'
      - 'devices/**/packages.list'
      - 'devices/**/feeds.conf'
      - 'scripts/ci/lint-presets.sh'
      - 'scripts/ci/validate-config.sh'
      - 'scripts/lib/expand-packages.sh'
  pull_request:
    paths:
      - 'common/presets/**'
      - 'common/base-config'
      - 'common/feeds.conf'
      - 'devices/**/target.conf'
      - 'devices/**/packages.list'
      - 'devices/**/feeds.conf'
      - 'scripts/ci/lint-presets.sh'
      - 'scripts/ci/validate-config.sh'
      - 'scripts/lib/expand-packages.sh'
  workflow_dispatch:
    inputs:
      device:
        description: 'Device ID, empty for all'
        required: false
        default: ''
      openwrt_repo:
        description: 'OpenWrt repo'
        default: 'K-Lrize/openwrt'
        required: true
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
        required: true

env:
  DEFAULT_OPENWRT_REPO: K-Lrize/openwrt
  DEFAULT_OPENWRT_REF: main

jobs:
  Lint-Presets:
    name: Lint presets + devices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run lint-presets.sh
        run: bash scripts/ci/lint-presets.sh

  Initialize:
    name: Compute device matrix
    runs-on: ubuntu-latest
    outputs:
      device_matrix: ${{ steps.set-matrix.outputs.device_matrix }}
      has_builds:    ${{ steps.set-matrix.outputs.has_builds }}
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute matrix (override or auto)
        id: set-matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEVICE_OVERRIDE: ${{ github.event.inputs.device }}
        run: |
          if [ -n "$DEVICE_OVERRIDE" ]; then
            echo "device_matrix=[\"$DEVICE_OVERRIDE\"]" >> $GITHUB_OUTPUT
            echo "has_builds=true" >> $GITHUB_OUTPUT
          else
            bash scripts/ci/calculate-matrix.sh
          fi

  Validate-Defconfig:
    name: Defconfig dry-run (${{ matrix.device }})
    needs: Initialize
    if: needs.Initialize.outputs.has_builds == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.Initialize.outputs.device_matrix) }}
    env:
      CONFIG_REPO_DIR: build-config

    steps:
      - name: Checkout OpenWrt source
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.inputs.openwrt_repo || env.DEFAULT_OPENWRT_REPO }}
          ref: ${{ github.event.inputs.openwrt_ref || env.DEFAULT_OPENWRT_REF }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout build-config
        uses: actions/checkout@v6
        with:
          path: ${{ env.CONFIG_REPO_DIR }}
          persist-credentials: false

      - name: Install host deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential git libncurses-dev \
            python3 python3-setuptools unzip jq

      - name: Prepare feeds (sdk/prepare.sh)
        run: |
          set -o pipefail
          bash "${CONFIG_REPO_DIR}/scripts/sdk/prepare.sh" \
            --workdir . \
            --device "${{ matrix.device }}"

      - name: Compose seed .config + run defconfig
        env:
          DEVICE: ${{ matrix.device }}
        run: |
          set -o pipefail
          # 三段种子拼装 (与 firmware-full.yml 保持一致):
          #   1) target.conf      硬件 + arch 注释 + 设备 select
          #   2) base-config      全局开关 + kmod + 兜底库
          #   3) packages.list 展开后翻译: +pkg → CONFIG_PACKAGE_pkg=y
          #      (-pkg 是 IB make image 语法, buildroot defconfig 不识别)
          cat "${CONFIG_REPO_DIR}/devices/${DEVICE}/target.conf" > .config
          echo "" >> .config
          cat "${CONFIG_REPO_DIR}/common/base-config" >> .config
          echo "" >> .config
          bash "${CONFIG_REPO_DIR}/scripts/lib/expand-packages.sh" \
              "${CONFIG_REPO_DIR}/devices/${DEVICE}/packages.list" \
              "${CONFIG_REPO_DIR}/common/presets" \
            | awk '/^\+/ { sub(/^\+/, ""); printf "CONFIG_PACKAGE_%s=y\n", $0 }' \
            >> .config

          # validate 阶段关掉 ccache/sccache, 防止跟 CONFIG_DEVEL 共存时 defconfig 报错
          echo "CONFIG_CCACHE=n" >> .config
          echo "CONFIG_RUST_SCCACHE=n" >> .config

          echo "::group::Seed .config"
          cat .config
          echo "::endgroup::"

          make defconfig

          echo "::group::Final .config (defconfig 后)"
          cat .config
          echo "::endgroup::"

      - name: Validate config (ci/validate-config.sh)
        run: |
          set -o pipefail
          bash "${CONFIG_REPO_DIR}/scripts/ci/validate-config.sh" "${{ matrix.device }}"
