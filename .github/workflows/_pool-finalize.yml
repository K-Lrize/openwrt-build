name: "[Reusable] Package Pool Finalizer"

# Reusable: 把所有 _pool-build.yml 上传的 chunk artifact 合成 per-arch tarball
# (pool-<arch>-<source>.tar.zst) + 跨 arch 的 pool manifest sidecar,推到 rolling release。
#
# 用一个任选 SDK tarball 借 scripts/ipkg-make-index.sh 与 apk 生成 Packages.gz /
# APKINDEX.tar.gz —— host-native,无 docker。

on:
  workflow_call:
    inputs:
      first_target_sdk_tar_name:
        description: 'finalize 用的 SDK tar asset 名 (任选一个 target,用于借 ipkg-make-index.sh)'
        type: string
        required: true
      source_slug:
        description: 'pool-chunk-* artifact 匹配模式里要用'
        type: string
        required: true
      pool_manifest_name:
        description: '跨 arch pool manifest sidecar 文件名'
        type: string
        required: true
      release_tag:
        description: '把 pool tar + manifest 附到哪个 Release tag'
        type: string
        default: 'rolling'
      update_release:
        description: '是否真的推到 Release (false 时只 dry-run)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  Finalize-Pool:
    name: Publish package pool
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gawk gzip jq zstd

      - name: Download pool chunks
        uses: actions/download-artifact@v8
        with:
          pattern: pool-chunk-*-${{ inputs.source_slug }}-*
          path: pool/
          merge-multiple: true

      - name: Download SDK tarball (for ipkg-make-index.sh)
        shell: bash
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          SDK_TAR_NAME:  ${{ inputs.first_target_sdk_tar_name }}
          RELEASE_TAG:   ${{ inputs.release_tag }}
        run: |
          set -e
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$SDK_TAR_NAME" \
            --output "$SDK_TAR_NAME"
          mkdir -p sdk-indexer
          tar --use-compress-program=unzstd -xf "$SDK_TAR_NAME" \
              -C sdk-indexer --strip-components=1

      - name: Generate indices for each arch/feed
        shell: bash
        run: |
          set -e
          # 清理 compile.sh 留下的非包文件
          find pool/ -name '.targets' -delete 2>/dev/null || true
          find pool/ -name '.reports' -prune -exec rm -rf {} + 2>/dev/null || true

          if [ -z "$(find pool/ -type f \( -name '*.ipk' -o -name '*.apk' \) 2>/dev/null)" ]; then
            echo "::warning::pool/ 下无 ipk/apk,跳过索引与打包。"
            exit 0
          fi

          bash scripts/sdk/index.sh --pool-dir pool --sdk-dir sdk-indexer

      - name: Pack per-arch tarballs + cross-arch manifest
        shell: bash
        env:
          POOL_MANIFEST_NAME: ${{ inputs.pool_manifest_name }}
          SOURCE_SLUG:        ${{ inputs.source_slug }}
        run: |
          set -e
          mkdir -p release-staging

          if [ ! -d pool ] || [ -z "$(find pool/ -mindepth 1 -maxdepth 1 -type d 2>/dev/null)" ]; then
            echo "::warning::pool 为空,跳过 release artifacts。"
            : > "release-staging/${POOL_MANIFEST_NAME}"
            exit 0
          fi

          for arch_dir in pool/*/; do
            arch="$(basename "$arch_dir")"
            tar_name="pool-${arch}-${SOURCE_SLUG}.tar.zst"
            echo "::group::打包 ${arch} → ${tar_name}"
            tar --use-compress-program='zstd -T0 -3' \
                -cf "release-staging/${tar_name}" \
                -C "$arch_dir" .
            du -h "release-staging/${tar_name}" | awk '{print $1, "'"$tar_name"'"}'
            echo "::endgroup::"
          done

          # 跨 arch 去重 manifest
          find pool/ -type f \( -name "*.ipk" -o -name "*.apk" \) \
            | xargs -n1 basename \
            | sed -E 's/\.(ipk|apk)$//' \
            | sed -E 's/_[0-9][^_]*_[a-z0-9_-]+$//' \
            | sort -u > "release-staging/${POOL_MANIFEST_NAME}"
          echo "pool manifest 包数量: $(wc -l < release-staging/${POOL_MANIFEST_NAME} | tr -d ' ')"

      - name: Update rolling release
        if: ${{ inputs.update_release }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release-staging/*
          prerelease: true
          make_latest: true
