name: 构建 OpenWrt 固件

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备 ID'
        required: true
        default: 'mt3600be'
      openwrt_repo:
        description: 'OpenWrt 仓库'
        default: 'K-Lrize/openwrt'
        required: true
      openwrt_ref:
        description: '分支'
        default: 'mediatek-mt3600be'
        required: true
      skip_validation:
        description: '跳过验证步骤'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      DEVICE: ${{ github.event.inputs.device }}

    steps:
      # ── 环境准备 ────────────────────────────────────────
      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget qemu-utils

      # ── 获取源码 ────────────────────────────────────────
      - name: 检出 OpenWrt 源码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.openwrt_repo }}
          ref: ${{ github.event.inputs.openwrt_ref }}
          fetch-depth: 1

      - name: 检出配置仓库
        uses: actions/checkout@v4
        with:
          path: build-config

      - name: 校验设备配置文件
        run: |
          if [[ ! -f "build-config/configs/${DEVICE}.config" ]]; then
            echo "::error::configs/${DEVICE}.config 不存在！"
            echo ""
            echo "::error::📋 可用设备列表："
            ls build-config/configs/*.config 2>/dev/null | while read f; do
              device=$(basename "$f" | sed 's/.config//')
              echo "::error::  • $device"
            done
            exit 1
          fi
          echo "✅ 设备配置文件已验证: configs/${DEVICE}.config"

      # ── Feeds 配置 ──────────────────────────────────────
      - name: 配置 feeds
        run: |
          FEEDS_FILE="build-config/configs/${DEVICE}.feeds"
          CUSTOM_FEEDS=()

          if [[ -f "$FEEDS_FILE" ]]; then
            echo "读取自定义 feeds: ${FEEDS_FILE}"
            while IFS=' ' read -r name url branch; do
              [[ -z "$name" || "$name" == \#* ]] && continue
              branch="${branch:-main}"
              echo "src-git ${name} ${url};${branch}" >> feeds.conf.default
              CUSTOM_FEEDS+=("$name")
              echo "  + ${name} (${url} @ ${branch})"
            done < "$FEEDS_FILE"
          else
            echo "无自定义 feeds 文件，使用官方 feeds"
          fi

          ./scripts/feeds update -a

          for feed in "${CUSTOM_FEEDS[@]}"; do
            echo "优先安装 feed: ${feed}"
            ./scripts/feeds install -a -p "$feed"
          done

          ./scripts/feeds install -a

          # 记录 feeds hash（写入工作区文件，hashFiles() 才能正确读取）
          {
            for feed_dir in feeds/*/; do
              feed_name=$(basename "$feed_dir")
              hash=$(git -C "$feed_dir" rev-parse HEAD 2>/dev/null || echo "not-a-git-repo")
              echo "${feed_name}:${hash}"
            done
          } > .feeds-hash
          echo "Feeds hash:"
          cat .feeds-hash

      # ── 生成配置 + 验证 ─────────────────────────────────
      - name: 生成完整编译配置
        run: |
          cp "build-config/configs/${DEVICE}.config" .config
          make defconfig

      - name: 验证配置
        if: ${{ github.event.inputs.skip_validation != 'true' }}
        run: |
          bash build-config/scripts/validate-config.sh \
            "build-config/configs/${DEVICE}.config" \
            "${DEVICE}"

      # ── 缓存 + 下载 ────────────────────────────────────
      - name: 缓存 dl/ 源码包
        uses: actions/cache@v4
        with:
          path: dl/
          key: openwrt-dl-${{ env.DEVICE }}-${{ github.event.inputs.openwrt_ref }}-${{ hashFiles('.config', '.feeds-hash') }}
          restore-keys: |
            openwrt-dl-${{ env.DEVICE }}-${{ github.event.inputs.openwrt_ref }}-
            openwrt-dl-${{ env.DEVICE }}-

      - name: 下载依赖源码
        run: |
          make download -j8
          find dl -size -1024c -delete

      # ── 编译 ────────────────────────────────────────────
      - name: 编译固件
        id: compile
        run: make -j$(nproc) V=sc 2>&1 | tee /tmp/build.log

      - name: 提取编译错误摘要
        if: failure() && steps.compile.outcome == 'failure'
        run: |
          {
            echo "## ❌ 编译失败摘要 — ${DEVICE}"
            echo ""
            echo "### 错误行"
            echo "\`\`\`"
            grep -n "Error\|error:\|fatal error" /tmp/build.log | tail -40 || echo "(未匹配到 Error 关键字)"
            echo "\`\`\`"
            echo ""
            echo "### 最后 80 行日志"
            echo "\`\`\`"
            tail -80 /tmp/build.log
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 产物上传 ────────────────────────────────────────
      - name: 生成校验和
        if: success()
        run: |
          cd bin/targets
          find . -type f \( -name "*sysupgrade*" -o -name "*factory*" \) \
            -exec sha256sum {} \; > sha256sums.txt
          echo "固件校验和:"
          cat sha256sums.txt

      - name: 上传固件
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openwrt-${{ env.DEVICE }}-${{ github.event.inputs.openwrt_ref }}-${{ github.run_number }}
          path: |
            bin/targets/**/*sysupgrade*
            bin/targets/**/*factory*
            bin/targets/**/sha256sums.txt
          retention-days: 7
          if-no-files-found: warn

      - name: 上传编译日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-${{ env.DEVICE }}-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 3
