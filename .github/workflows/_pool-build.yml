name: "[Reusable] Pool — Per-target chunk compile"

# Reusable: per-target Pool 编译, 4-chunk 并发跑 sdk/compile。
# SDK 来源走 base-rolling release tarball (无 docker), 消费链全部 host-native:
#   gh release download SDK → tar -xf → sdk/prepare → ci/select-chunk → sdk/compile
#
# 调用方 (pool-update.yml) 跟着调 _pool-finalize.yml 把所有 chunk 汇总, 生成
# pool-<arch>-<source>.tar.zst 推 pool-rolling release。

on:
  workflow_call:
    inputs:
      sdk_tar_name:
        description: 'SDK tarball asset 名 (asset-names.sh sdk_tar_name 算出)'
        type: string
        required: true
      target_slug:
        description: 'slugify(target), artifact 命名 + 日志可读'
        type: string
        required: true
      source_slug:
        description: 'source_slug(repo,ref), 用于 artifact 跨 run 区分'
        type: string
        required: true
      base_release_tag:
        description: '从哪个 release tag 下载 SDK tar (Base 层)'
        type: string
        default: 'base-rolling'
      strict:
        description: 'defconfig 后包名缺失时硬失败 (Pool 默认 true)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  Build-Pool-Chunk:
    name: Compile pool ${{ inputs.target_slug }} chunk ${{ matrix.chunk }}/4
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]
    steps:
      - name: Checkout build-config
        uses: actions/checkout@v6
        with:
          path: build-config

      - name: Install host build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache file gawk gettext git jq \
            libncurses-dev libssl-dev python3 rsync unzip wget xsltproc \
            zlib1g-dev zstd

      - name: Download SDK tarball from base-rolling
        shell: bash
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          SDK_TAR_NAME:  ${{ inputs.sdk_tar_name }}
          RELEASE_TAG:   ${{ inputs.base_release_tag }}
        run: |
          set -e
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$SDK_TAR_NAME" \
            --output "$SDK_TAR_NAME"
          mkdir -p sdk-work
          tar --use-compress-program=unzstd -xf "$SDK_TAR_NAME" \
              -C sdk-work --strip-components=1

      - name: Select chunk from presets union
        shell: bash
        env:
          CHUNK_ID: ${{ matrix.chunk }}
        run: |
          bash build-config/scripts/ci/select-chunk.sh \
            --conf-dir build-config \
            --chunk-id "$CHUNK_ID" \
            --chunk-count 4 \
            --output chunk.txt

      - name: Prepare SDK feeds (sdk/prepare.sh)
        shell: bash
        run: |
          bash build-config/scripts/sdk/prepare.sh \
            --workdir sdk-work \
            --conf-dir "$GITHUB_WORKSPACE/build-config" \
            --packages chunk.txt

      - name: Compile chunk (sdk/compile.sh)
        shell: bash
        env:
          STRICT_FLAG: ${{ inputs.strict && '--strict' || '' }}
        run: |
          mkdir -p pool-out
          bash build-config/scripts/sdk/compile.sh \
            --workdir sdk-work \
            --packages chunk.txt \
            --out pool-out \
            $STRICT_FLAG

      - name: Upload chunk artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pool-chunk-${{ inputs.target_slug }}-${{ inputs.source_slug }}-${{ matrix.chunk }}
          path: pool-out/packages/
          if-no-files-found: warn
