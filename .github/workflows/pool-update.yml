name: "[Build] Update package pool"

# 独立的 Pool 修复入口:
#   - 不重建 SDK / IB,从 rolling release 下载已有 SDK tar
#   - checkout 拿当前分支最新的 custom-packages.txt (修了配置随手重跑)
#   - 失败不染红 base.yml;本工作流自身允许红,便于关注修复进度
#
# 触发方式:
#   - base.yml 末尾 gh CLI 自动触发 (首次构建一站式完成)
#   - 手动 workflow_dispatch (修复 custom-packages.txt 后单独跑)

permissions:
  contents: write
  actions: read

env:
  DEFAULT_OPENWRT_REF: main
  DEFAULT_OPENWRT_REPO: K-Lrize/openwrt
  RELEASE_TAG: rolling

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt repo (必须跟 base.yml 上一次构建对齐才能匹配 SDK asset 名)'
        default: 'K-Lrize/openwrt'
        required: true
      openwrt_ref:
        description: 'OpenWrt ref'
        default: 'main'
        required: true
      strict:
        description: 'defconfig 后包名缺失是否硬失败 (建议 true)'
        type: boolean
        default: true
      update_release:
        description: '是否把 pool tar + manifest 推到 rolling release'
        type: boolean
        default: true

jobs:
  Initialize:
    name: Prepare
    runs-on: ubuntu-24.04
    outputs:
      target_matrix_with_meta:    ${{ steps.matrix.outputs.target_matrix_with_meta }}
      source_slug:                ${{ steps.matrix.outputs.source_slug }}
      pool_manifest_name:         ${{ steps.matrix.outputs.pool_manifest_name }}
      first_target_sdk_tar_name:  ${{ steps.matrix.outputs.first_target_sdk_tar_name }}
      has_builds:                 ${{ steps.matrix.outputs.has_builds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build matrix
        id: matrix
        env:
          OPENWRT_REPO: ${{ inputs.openwrt_repo }}
          OPENWRT_REF:  ${{ inputs.openwrt_ref }}
        run: bash scripts/ci/calculate-matrix.sh

  Build-Pool:
    name: Build pool
    needs: Initialize
    if: needs.Initialize.outputs.has_builds == 'true'
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.Initialize.outputs.target_matrix_with_meta) }}
    uses: ./.github/workflows/_pool-build.yml
    with:
      sdk_tar_name:  ${{ matrix.entry.sdk_tar_name }}
      target_slug:   ${{ matrix.entry.target_slug }}
      source_slug:   ${{ needs.Initialize.outputs.source_slug }}
      release_tag:   rolling
      strict:        ${{ inputs.strict }}

  Finalize-Pool:
    name: Finalize pool
    needs: [Initialize, Build-Pool]
    if: needs.Initialize.outputs.has_builds == 'true'
    uses: ./.github/workflows/_pool-finalize.yml
    with:
      first_target_sdk_tar_name: ${{ needs.Initialize.outputs.first_target_sdk_tar_name }}
      source_slug:               ${{ needs.Initialize.outputs.source_slug }}
      pool_manifest_name:        ${{ needs.Initialize.outputs.pool_manifest_name }}
      release_tag:               rolling
      update_release:            ${{ inputs.update_release }}
