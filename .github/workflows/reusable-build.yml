name: OpenWrt Build Module

on:
  workflow_call:
    inputs:
      device:
        required: true
        type: string
      openwrt_repo:
        required: true
        type: string
      openwrt_ref:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      DEVICE: ${{ inputs.device }}
      CONFIG_REPO_DIR: build-config
      CCACHE_BASEDIR: ${{ github.workspace }} 
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: 2G

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget qemu-utils ccache jq

      - name: Install SCCache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Checkout OpenWrt
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.openwrt_repo }}
          ref: ${{ inputs.openwrt_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout Config Repo
        uses: actions/checkout@v6
        with:
          path: ${{ env.CONFIG_REPO_DIR }}
          persist-credentials: false

      - name: Sync Feeds & Assets
        run: |
          bash "${CONFIG_REPO_DIR}/scripts/sync-feeds.sh" "${DEVICE}"
          bash "${CONFIG_REPO_DIR}/scripts/merge-assets.sh" "${DEVICE}"

      - name: Configure Build
        run: |
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          echo "CONFIG_CCACHE_DIR=\"${CCACHE_DIR}\"" >> .config
          echo "CONFIG_RUST_SCCACHE=y" >> .config
          echo "CONFIG_RUST_SCCACHE_DIR=\"${SCCACHE_DIR}\"" >> .config
          make defconfig
          bash "${CONFIG_REPO_DIR}/scripts/run-firmware-scripts.sh" "${DEVICE}"

      - name: Hash Environment
        id: hashes
        shell: bash
        run: |
          set -o pipefail

          # scripts/ 变动频繁但不影响工具链二进制
          toolchain_hash=$(
            find tools/ toolchain/ include/ -type f -print0 \
              | sort -z | xargs -0 sha256sum | sha256sum \
              | cut -d' ' -f1 | cut -c1-12
          )
          echo "toolchain_hash=$toolchain_hash" >> "$GITHUB_OUTPUT"

          arch=$(grep '^CONFIG_TARGET_ARCH_PACKAGES=' .config | cut -d'"' -f2 || true)
          [ -z "$arch" ] && arch=$(grep '^CONFIG_ARCH=' .config | cut -d'"' -f2 || echo "unknown")
          echo "arch=$arch" >> "$GITHUB_OUTPUT"

          feed_hash=$(
            for d in feeds/*/; do
              git -C "$d" rev-parse HEAD 2>/dev/null || true
            done | sort | sha256sum | cut -c1-8
          )
          echo "feed_hash=${feed_hash:-nofeed}" >> "$GITHUB_OUTPUT"

          echo "year_week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache CCache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ env.DEVICE }}-${{ steps.hashes.outputs.year_week }}
          restore-keys: ccache-${{ runner.os }}-${{ env.DEVICE }}-

      - name: Cache SCCache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-${{ env.DEVICE }}-${{ steps.hashes.outputs.year_week }}
          restore-keys: sccache-${{ runner.os }}-${{ env.DEVICE }}-

      - name: Cache Toolchain
        uses: actions/cache@v5
        with:
          path: |
            staging_dir/host*
            staging_dir/toolchain-*
            build_dir/host*
            build_dir/toolchain-*
          # 以架构为 key，同架构多设备共享；
          key: toolchain-${{ runner.os }}-${{ steps.hashes.outputs.arch }}-${{ steps.hashes.outputs.toolchain_hash }}

      - name: Cache Lang Deps
        uses: actions/cache@v5
        with:
          path: |
            dl/go-mod-cache/
            dl/cargo/
          # feed 版本变化时失效；
          key: lang-${{ runner.os }}-${{ steps.hashes.outputs.feed_hash }}

      - name: Cache Tarballs
        uses: actions/cache@v5
        with:
          path: |
            dl/
            !dl/go-mod-cache/**
            !dl/cargo/**
          key: dl-${{ runner.os }}-${{ steps.hashes.outputs.year_week }}-${{ steps.hashes.outputs.feed_hash }}
          restore-keys: dl-${{ runner.os }}-${{ steps.hashes.outputs.year_week }}-

      - name: Download Sources
        run: make download -j8 || make download -j1 V=s

      - name: Build Host Tools
        run: make tools/install -j$(nproc) || make tools/install -j1 V=s

      - name: Build Toolchain
        run: make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build Firmware
        run: |
          mkdir -p $CCACHE_DIR $SCCACHE_DIR
          make -j$(nproc) BUILD_LOG=1 || make -j1 V=s
          ccache -s
          "${SCCACHE_PATH:-sccache}" -s || true

      - name: Inspect Cache Paths
        if: always()
        shell: bash
        run: |
          echo "::group::dl/ subdirs"
          find dl -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort || echo "none"
          echo "::endgroup::"
          echo "::group::toolchain sizes"
          shopt -s nullglob
          paths=(staging_dir/host* staging_dir/toolchain-* build_dir/host* build_dir/toolchain-*)
          [ ${#paths[@]} -gt 0 ] && du -sh "${paths[@]}" || echo "none"
          echo "::endgroup::"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ inputs.device }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 3

      - name: Organize Artifacts
        run: |
          mkdir -p bin/outputs
          while IFS= read -r -d '' file; do
            filename="$(basename "$file")"
            cp -v "$file" "bin/outputs/${DEVICE}-${filename}"
          done < <(find bin/targets/ -type f \( -name "*sysupgrade*" -o -name "*factory*" -o -name "*.manifest" -o -name "profiles.json" \) -print0)
          bash "${CONFIG_REPO_DIR}/.github/workflows/scripts/generate-checksums.sh" "bin/outputs"
          mv "bin/outputs/sha256sums.txt" "bin/outputs/${DEVICE}-sha256sums.txt"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ inputs.device }}
          path: bin/outputs/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 3
